<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141829;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff006e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="192" height="192" fill="url(#bgGradient)"/>
  
  <!-- Rounded frame -->
  <rect x="12" y="12" width="168" height="168" rx="24" ry="24" fill="none" stroke="url(#accentGradient)" stroke-width="3"/>
  
  <!-- Glitch effect - left offset squares -->
  <rect x="40" y="60" width="28" height="28" fill="#00d4ff" opacity="0.7"/>
  <rect x="38" y="58" width="28" height="28" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.4"/>
  
  <!-- Center vertical bar -->
  <rect x="88" y="45" width="16" height="102" fill="url(#accentGradient)"/>
  
  <!-- Glitch effect - right offset squares -->
  <rect x="124" y="105" width="28" height="28" fill="#ff006e" opacity="0.7"/>
  <rect x="126" y="107" width="28" height="28" fill="none" stroke="#ff006e" stroke-width="2" opacity="0.4"/>
  
  <!-- Scanline effect -->
  <line x1="30" y1="100" x2="162" y2="100" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="30" y1="110" x2="162" y2="110" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="30" y1="120" x2="162" y2="120" stroke="#00d4ff" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Pixel dots for tech feel -->
  <circle cx="50" cy="140" r="3" fill="#00d4ff" opacity="0.6"/>
  <circle cx="70" cy="130" r="3" fill="#ff006e" opacity="0.6"/>
  <circle cx="142" cy="145" r="3" fill="#00d4ff" opacity="0.6"/>
</svg>
